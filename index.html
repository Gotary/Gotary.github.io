<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title></title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: #ffffff;
            padding: 30px 0;
        }
        /* 左右留白，不顶手机屏幕 */
        .container {
            padding: 0 20px;
            max-width: 100%;
            margin: 0 auto;
        }
        /* 上传按钮默认隐藏，访客看不到 */
        .upload-btn {
            position: fixed;
            top: 20px;
            right: 20px;
            width: 50px;
            height: 50px;
            background: #fff;
            border: 2px solid #eee;
            border-radius: 50%;
            font-size: 24px;
            color: #333;
            cursor: pointer;
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 999;
        }
        #file-input {
            display: none;
        }
        /* 照片上下宽松间距 */
        .waterfall {
            display: flex;
            flex-direction: column;
            gap: 30px;
        }
        /* 图片保持直角，不要圆角 */
        .waterfall img {
            width: 100%;
            border-radius: 0;
            display: block;
            cursor: pointer;
        }
        /* 大图预览 */
        .preview {
            position: fixed;
            inset: 0;
            background: rgba(255,255,255,0.97);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 998;
        }
        .preview img {
            max-width: 92vw;
            max-height: 90vh;
            border-radius: 0;
        }
        .close-btn {
            position: fixed;
            top: 20px;
            right: 20px;
            border: none;
            background: transparent;
            font-size: 32px;
            color: #333;
            cursor: pointer;
            z-index: 999;
        }
    </style>
</head>
<body>

<button class="upload-btn" onclick="fileInput.click()">+</button>
<input type="file" id="file-input" accept="image/*" multiple>

<div class="container">
    <div class="waterfall" id="waterfall"></div>
</div>

<div class="preview" id="preview">
    <button class="close-btn">×</button>
    < img src="">
</div>

<script>
// 管理员密码
const ADMIN_PWD = "123686";
let isAdmin = false;
let clickCount = 0;

const fileInput = document.getElementById('file-input');
const waterfall = document.getElementById('waterfall');
const preview = document.getElementById('preview');
const previewImg = preview.querySelector('img');
const uploadBtn = document.querySelector('.upload-btn');

// 共用存储，所有人打开都能看到
const KEY = "shared_photo_80size";
let imgList = JSON.parse(localStorage.getItem(KEY)) || [];

// 渲染图片
function render() {
    waterfall.innerHTML = "";
    imgList.forEach((src, idx) => {
        let img = document.createElement("img");
        img.src = src;
        img.onclick = () => {
            if (isAdmin) {
                if(confirm("确定删除这张照片？")){
                    imgList.splice(idx, 1);
                    localStorage.setItem(KEY, JSON.stringify(imgList));
                    render();
                }
            } else {
                previewImg.src = src;
                preview.style.display = "flex";
            }
        };
        waterfall.appendChild(img);
    });
}
render();

// 三连击管理员解锁
document.body.addEventListener('click', () => {
    clickCount++;
    setTimeout(() => clickCount = 0, 800);
    if(clickCount >= 3 && !isAdmin){
        let pwd = prompt("请输入管理员密码");
        if(pwd === ADMIN_PWD){
            isAdmin = true;
            uploadBtn.style.display = "flex";
            alert("管理员已开启，可以上传删除，支持80张稳定存储");
        }else{
            alert("密码错误");
        }
    }
});

// 上传 + 自动压缩，专门为存够80张优化
fileInput.addEventListener("change", async e => {
    if(!isAdmin) return;
    for(let file of e.target.files) {
        let base64 = await compressImg(file);
        imgList.push(base64);
        // 保存回共用存储
        localStorage.setItem(KEY, JSON.stringify(imgList));
        render();
    }
    fileInput.value = "";
});

// 图片压缩核心：瘦身但画质好看，专门为容纳80张设计
function compressImg(file) {
    return new Promise(resolve => {
        const r = new FileReader();
        r.readAsDataURL(file);
        r.onload = ev => {
            let img = new Image();
            img.src = ev.target.result;
            img.onload = () => {
                let canvas = document.createElement("canvas");
                let w = img.width;
                let h = img.height;
                const max = 1200;

                if(w > h && w > max) { h = h * max / w; w = max; }
                if(h > max) { w = w * max / h; h = max; }

                canvas.width = w;
                canvas.height = h;
                canvas.getContext("2d").drawImage(img, 0, 0, w, h);
                // 压缩质量适中，保证能放下80张
                resolve(canvas.toDataURL("image/jpeg", 0.7));
            }
        }
    });
}

// 关闭预览
preview.onclick = e => {
    if(e.target === preview) preview.style.display = "none";
};
close-btn.onclick = () => preview.style.display = "none";
</script>

</body>
</html>
