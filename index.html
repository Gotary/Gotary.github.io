<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <meta http-equiv="X-UA-Compatible" content="IE=edge"/>
    <title></title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: #fff;
            min-height: 100vh;
            padding: 30px 0;
        }
        /* 左右留白，不顶手机屏幕 */
        .container {
            padding: 0 20px;
            max-width: 100%;
            margin: 0 auto;
        }
        /* 管理员上传按钮 默认隐藏，访客看不到 */
        .upload-btn {
            position: fixed;
            top: 20px;
            right: 20px;
            width: 52px;
            height: 52px;
            background: #fff;
            border: 2px solid #eee;
            border-radius: 50%;
            font-size: 26px;
            color: #333;
            cursor: pointer;
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 999;
        }
        .upload-btn:hover {
            border-color: #ccc;
        }
        #file-input {
            display: none;
        }
        /* 瀑布流上下间距宽松 */
        .waterfall {
            display: flex;
            flex-direction: column;
            gap: 32px;
        }
        /* 图片直角 不圆角 */
        .waterfall img {
            width: 100%;
            border-radius: 0;
            display: block;
            cursor: pointer;
            background: #f8f8f8;
        }
        /* 预览层 */
        .preview {
            position: fixed;
            inset: 0;
            background: rgba(255,255,255,0.97);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 998;
        }
        .preview img {
            max-width: 92vw;
            max-height: 90vh;
            border-radius: 0;
        }
        .close-btn {
            position: fixed;
            top: 20px;
            right: 20px;
            font-size: 34px;
            background: transparent;
            border: none;
            color: #333;
            cursor: pointer;
            z-index: 999;
        }
        .loading {
            text-align: center;
            padding: 20px;
            color: #999;
        }
    </style>
</head>
<body>
    <button class="upload-btn" onclick="fileInput.click()">+</button>
    <input type="file" id="file-input" accept="image/*" multiple />

    <div class="container">
        <div class="waterfall" id="waterfall"></div>
    </div>

    <div class="preview" id="preview">
        <button class="close-btn">×</button>
        < img src="" alt="" />
    </div>

<script>
// 管理员密码
const ADMIN_PWD = "123686";
let isAdmin = false;
let clickCount = 0;

const fileInput = document.getElementById('file-input');
const waterfall = document.getElementById('waterfall');
const preview = document.getElementById('preview');
const previewImg = preview.querySelector('img');
const closeBtn = document.querySelector('.close-btn');
const uploadBtn = document.querySelector('.upload-btn');

// 图片列表存在云端持久化
let imgList = JSON.parse(localStorage.getItem('imgCloudList')) || [];

// 渲染所有图片
function renderImages() {
    waterfall.innerHTML = "";
    imgList.forEach((url, idx) => {
        const img = document.createElement('img');
        img.src = url;
        // 管理员可删除，访客仅预览
        img.onclick = () => {
            if (isAdmin) {
                if(confirm("确定删除这张照片？")){
                    imgList.splice(idx, 1);
                    localStorage.setItem('imgCloudList', JSON.stringify(imgList));
                    renderImages();
                }
            } else {
                previewImg.src = url;
                preview.style.display = 'flex';
            }
        };
        waterfall.appendChild(img);
    });
}

// 初始化渲染
renderImages();

// 三连击唤醒管理员密码
document.body.addEventListener('click', () => {
    clickCount++;
    setTimeout(()=> clickCount = 0, 800);
    if(clickCount >= 3 && !isAdmin){
        let pwd = prompt("请输入管理员密码");
        if(pwd === ADMIN_PWD){
            isAdmin = true;
            uploadBtn.style.display = "flex";
            alert("验证成功：已开启上传+删除权限");
        }else{
            alert("密码错误");
        }
    }
});

// 上传图片 + 压缩优化，解决微信卡死、上传受限
fileInput.addEventListener('change', async (e) => {
    if(!isAdmin) return;
    const files = e.target.files;
    for (let file of files) {
        // 压缩图片，避免体积过大导致浏览器/微信卡死
        const compressed = await compressImage(file);
        // 转为线上url存入列表
        imgList.push(compressed);
        localStorage.setItem('imgCloudList', JSON.stringify(imgList));
        renderImages();
    }
    fileInput.value = "";
});

// 图片压缩核心（根治传几张就不能传、内存爆满）
function compressImage(file) {
    return new Promise(resolve => {
        const reader = new FileReader();
        reader.readAsDataURL(file);
        reader.onload = ev => {
            const img = new Image();
            img.src = ev.target.result;
            img.onload = () => {
                const canvas = document.createElement('canvas');
                const ctx = canvas.getContext('2d');
                // 最大长边1600，压缩体积不影响观看
                let w = img.width;
                let h = img.height;
                const maxSide = 1600;
                if(w > h && w > maxSide){
                    h = h * maxSide / w;
                    w = maxSide;
                }
                if(h > maxSide){
                    w = w * maxSide / h;
                    h = maxSide;
                }
                canvas.width = w;
                canvas.height = h;
                ctx.drawImage(img, 0, 0, w, h);
                // 压缩质量0.8
                resolve(canvas.toDataURL("image/jpeg", 0.8));
            }
        }
    });
}

// 关闭预览
closeBtn.onclick = () => preview.style.display = 'none';
preview.onclick = e => {
    if(e.target === preview) preview.style.display = 'none';
};
</script>
</body>
</html>
