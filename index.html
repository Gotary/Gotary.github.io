<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title></title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #ffffff;
            padding: 20px;
            min-height: 100vh;
        }

        /* 极简上传按钮 */
        .upload-trigger {
            position: fixed;
            top: 20px;
            right: 20px;
            width: 48px;
            height: 48px;
            border-radius: 50%;
            background: #f0f0f0;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.2s ease;
            z-index: 100;
            font-size: 24px;
            color: #666;
        }

        .upload-trigger:hover {
            background: #e0e0e0;
        }

        #fileInput {
            display: none;
        }

        /* 单列瀑布流容器 */
        .gallery {
            max-width: 800px;
            margin: 0 auto;
            column-count: 1;
            column-gap: 20px;
        }

        .gallery-item {
            break-inside: avoid;
            margin-bottom: 20px;
            border-radius: 4px;
            overflow: hidden;
            cursor: pointer;
            transition: opacity 0.2s ease;
        }

        .gallery-item:hover {
            opacity: 0.95;
        }

        .gallery-item img {
            width: 100%;
            display: block;
        }

        /* 大图预览 */
        .preview {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(255, 255, 255, 0.98);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 999;
            padding: 40px;
        }

        .preview img {
            max-width: 100%;
            max-height: 100%;
        }

        .preview-close {
            position: absolute;
            top: 20px;
            right: 20px;
            width: 48px;
            height: 48px;
            border-radius: 50%;
            background: #f0f0f0;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            font-size: 24px;
            color: #666;
        }

        .preview-close:hover {
            background: #e0e0e0;
        }

        /* 移动端适配 */
        @media (max-width: 768px) {
            body {
                padding: 15px;
            }
            
            .gallery {
                column-gap: 15px;
            }
            
            .gallery-item {
                margin-bottom: 15px;
            }
        }
    </style>
</head>
<body>
    <!-- 上传按钮 -->
    <input type="file" id="fileInput" accept="image/*" multiple>
    <label for="fileInput" class="upload-trigger">+</label>

    <!-- 作品画廊 -->
    <div class="gallery" id="gallery"></div>

    <!-- 大图预览 -->
    <div class="preview" id="preview">
        <div class="preview-close" onclick="closePreview()">×</div>
        < img id="previewImg">
    </div>

    <script>
        const fileInput = document.getElementById('fileInput');
        const gallery = document.getElementById('gallery');
        const preview = document.getElementById('preview');
        const previewImg = document.getElementById('previewImg');

        // 上传图片
        fileInput.onchange = function(e) {
            const files = e.target.files;
            for (let i = 0; i < files.length; i++) {
                const imgUrl = URL.createObjectURL(files[i]);
                addImageToGallery(imgUrl);
            }
        }

        // 添加图片到画廊
        function addImageToGallery(src) {
            const item = document.createElement('div');
            item.className = 'gallery-item';
            
            const img = document.createElement('img');
            img.src = src;
            img.onclick = function() {
                preview.style.display = 'flex';
                previewImg.src = this.src;
            }
            
            item.appendChild(img);
            gallery.prepend(item);
        }

        // 关闭预览
        function closePreview() {
            preview.style.display = 'none';
        }

        // 点击空白处关闭预览
        preview.onclick = function(e) {
            if (e.target === preview) {
                closePreview();
            }
        }
    </script>
</body>
</html>
