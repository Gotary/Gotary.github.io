<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>个人共享相册</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:system-ui,sans-serif}
body{background:#f5f5f5;padding:20px;max-width:1200px;margin:0 auto}
h1{text-align:center;margin-bottom:24px;color:#333}
.admin{background:#fff;padding:20px;border-radius:8px;margin-bottom:20px;box-shadow:0 2px 6px #00000015}
.cfg-box,.upload-box{margin-top:15px;display:none}
input{padding:10px;border:1px solid #ddd;border-radius:4px;margin:6px 0;width:100%;max-width:400px}
button{padding:10px 18px;border:none;border-radius:4px;background:#2488ff;color:#fff;cursor:pointer;margin:6px 0}
button.del{background:#f56c6c}
.tip{font-size:14px;color:#666;margin:8px 0}
.photo-list{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:20px}
.item{background:#fff;border-radius:0;overflow:hidden;position:relative}
.item img{width:100%;display:block;padding:10px}
.del-btn{position:absolute;top:8px;right:8px;width:26px;height:26px;border-radius:50%;background:#f56c6c;color:#fff;text-align:center;line-height:26px;cursor:pointer;display:none}
.item:hover .del-btn{display:block}
</style>
</head>
<body>

<h1>共享相册</h1>

<div class="admin">
  <input type="password" id="pwdInp" placeholder="输入管理密码 123686">
  <button onclick="loginAdmin()">管理员登录</button>

  <div class="cfg-box" id="cfgBox">
    <div class="tip">请自己填写下面配置（仅保存在你浏览器，别人看不到）</div>
    <input id="uName" placeholder="GitHub 用户名">
    <input id="uRepo" placeholder="仓库名 photo-album">
    <input id="uGist" placeholder="GistID">
    <input id="uToken" placeholder="你的私密Token，不要发给任何人">
    <button onclick="saveCfg()">保存我的配置</button>
  </div>

  <div class="upload-box" id="uploadBox">
    <input type="file" id="fileInp" accept="image/*" multiple>
    <button onclick="upImg()">上传图片</button>
    <div class="tip">最多保存80张，仅管理员可操作</div>
  </div>
</div>

<div class="photo-list" id="photoList"></div>

<script>
const PASS = "123686";
const MAX_NUM = 80;
let adminMode = false;
let imgArr = [];
let cfg = JSON.parse(localStorage.getItem("myAlbumCfg")||"{}");

window.onload = async function(){
  await loadImages();
  renderList();
};

function loginAdmin(){
  let val = document.getElementById("pwdInp").value.trim();
  if(val === PASS){
    adminMode = true;
    document.getElementById("cfgBox").style.display = "block";
    document.getElementById("uploadBox").style.display = "block";
    // 回填已有配置
    document.getElementById("uName").value = cfg.username||"";
    document.getElementById("uRepo").value = cfg.repo||"";
    document.getElementById("uGist").value = cfg.gistid||"";
    document.getElementById("uToken").value = cfg.token||"";
    alert("管理员已登录，可以配置+上传");
  }else{
    alert("密码错误");
  }
}

function saveCfg(){
  cfg.username = document.getElementById("uName").value.trim();
  cfg.repo = document.getElementById("uRepo").value.trim();
  cfg.gistid = document.getElementById("uGist").value.trim();
  cfg.token = document.getElementById("uToken").value.trim();
  localStorage.setItem("myAlbumCfg",JSON.stringify(cfg));
  alert("配置已保存在你本地浏览器，安全不泄露！");
  loadImages();
}

async function loadImages(){
  if(!cfg.gistid)return;
  try{
    let res = await fetch("https://api.github.com/gists/"+cfg.gistid);
    let json = await res.json();
    imgArr = JSON.parse(json.files["photos.json"].content);
  }catch(e){
    console.log("读取图库失败",e);
  }
}

function renderList(){
  let html = "";
  imgArr.forEach((item,idx)=>{
    html += `
    <div class="item">
      < img src="${item.url}" alt="">
      ${adminMode?`<div class="del-btn" onclick="delImg(${idx})">×</div>`:""}
    </div>
    `;
  });
  document.getElementById("photoList").innerHTML = html;
}

async function upImg(){
  if(!cfg.username||!cfg.repo||!cfg.token||!cfg.gistid){
    return alert("请先填写并保存上方配置");
  }
  let files = document.getElementById("fileInp").files;
  if(files.length<1)return alert("请选择图片");
  if(imgArr.length + files.length > MAX_NUM){
    return alert("超出80张上限，无法继续上传");
  }

  for(let file of files){
    let base64 = await file2base64(file);
    let name = Date.now()+"_"+file.name;
    let content = base64.split(",")[1];

    await fetch(`https://api.github.com/repos/${cfg.username}/${cfg.repo}/contents/${name}`,{
      method:"PUT",
      headers:{Authorization:"token "+cfg.token},
      body:JSON.stringify({message:"upload",content})
    });

    let cdnUrl = `https://cdn.jsdelivr.net/gh/${cfg.username}/${cfg.repo}/${name}`;
    imgArr.push({name,url:cdnUrl});
  }
  await updateGist();
  renderList();
  alert("上传完成，别人刷新就能看到");
}

async function delImg(idx){
  if(!confirm("确定删除？"))return;
  let one = imgArr[idx];
  let res = await fetch(`https://api.github.com/repos/${cfg.username}/${cfg.repo}/contents/${one.name}`,{
    headers:{Authorization:"token "+cfg.token}
  });
  let data = await res.json();

  await fetch(`https://api.github.com/repos/${cfg.username}/${cfg.repo}/contents/${one.name}`,{
    method:"DELETE",
    headers:{Authorization:"token "+cfg.token},
    body:JSON.stringify({message:"del",sha:data.sha})
  });

  imgArr.splice(idx,1);
  await updateGist();
  renderList();
}

async function updateGist(){
  await fetch("https://api.github.com/gists/"+cfg.gistid,{
    method:"PATCH",
    headers:{Authorization:"token "+cfg.token},
    body:JSON.stringify({files:{"photos.json":{content:JSON.stringify(imgArr)}}})
  });
}

function file2base64(file){
  return new Promise(res=>{
    let r = new FileReader();
    r.onload=e=>res(e.target.result);
    r.readAsDataURL(file);
  });
}
</script>
</body>
</html>
