<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title></title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: #ffffff;
            padding: 30px 0;
        }
        .container {
            padding: 0 20px;
        }
        .upload-btn {
            position: fixed;
            top: 20px;
            right: 20px;
            width: 50px;
            height: 50px;
            background: #fff;
            border: 2px solid #eee;
            border-radius: 50%;
            font-size: 24px;
            color: #333;
            cursor: pointer;
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 999;
        }
        #file-input {
            display: none;
        }
        .waterfall {
            display: flex;
            flex-direction: column;
            gap: 30px;
        }
        .waterfall img {
            width: 100%;
            border-radius: 0;
            display: block;
            cursor: pointer;
        }
        .preview {
            position: fixed;
            inset: 0;
            background: rgba(255,255,255,0.97);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 998;
        }
        .preview img {
            max-width: 92vw;
            max-height: 90vh;
            border-radius: 0;
        }
        .close-btn {
            position: fixed;
            top: 20px;
            right: 20px;
            border: none;
            background: transparent;
            font-size: 32px;
            color: #333;
            cursor: pointer;
            z-index: 999;
        }
    </style>
</head>
<body>

<button class="upload-btn" onclick="fileInput.click()">+</button>
<input type="file" id="file-input" accept="image/*" multiple>

<div class="container">
    <div class="waterfall" id="waterfall"></div>
</div>

<div class="preview" id="preview">
    <button class="close-btn">×</button>
    < img src="">
</div>

<script>
const ADMIN_PWD = "123686";
let isAdmin = false;
let clickCount = 0;

const fileInput = document.getElementById('file-input');
const waterfall = document.getElementById('waterfall');
const preview = document.getElementById('preview');
const previewImg = preview.querySelector('img');
const uploadBtn = document.querySelector('.upload-btn');

// 专用大容量存储key + 深度压缩，专门为80张优化
const STORAGE_KEY = "photo_album_80_capacity";
let imgList = JSON.parse(localStorage.getItem(STORAGE_KEY)) || [];

function render() {
    waterfall.innerHTML = "";
    imgList.forEach((src, idx) => {
        let img = document.createElement("img");
        img.src = src;
        img.onclick = function(){
            if (isAdmin) {
                if(confirm("确定删除这张照片？")){
                    imgList.splice(idx, 1);
                    localStorage.setItem(STORAGE_KEY, JSON.stringify(imgList));
                    render();
                }
            } else {
                previewImg.src = src;
                preview.style.display = "flex";
            }
        }
        waterfall.appendChild(img);
    });
}
render();

// 三连击解锁管理员
document.body.addEventListener('click', function(){
    clickCount++;
    setTimeout(() => clickCount = 0, 800);
    if(clickCount >= 3 && !isAdmin){
        let pwd = prompt("请输入管理员密码");
        if(pwd === ADMIN_PWD){
            isAdmin = true;
            uploadBtn.style.display = "flex";
            alert("管理员已开启，可以上传删除");
        }else{
            alert("密码错误");
        }
    }
});

// 上传+深度压缩，大幅节省空间，稳存80张
fileInput.addEventListener("change", async function(e){
    if(!isAdmin) return;
    let files = e.target.files;
    for(let i = 0; i < files.length; i++){
        let compressed = await compressImage(files[i]);
        imgList.push(compressed);
        localStorage.setItem(STORAGE_KEY, JSON.stringify(imgList));
        render();
    }
    fileInput.value = "";
});

// 图片压缩：降分辨率+降质量，空间直接省一半以上
function compressImage(file) {
    return new Promise(resolve => {
        const reader = new FileReader();
        reader.readAsDataURL(file);
        reader.onload = function(ev){
            let img = new Image();
            img.src = ev.target.result;
            img.onload = function(){
                let canvas = document.createElement("canvas");
                let w = img.width;
                let h = img.height;
                const maxSide = 1000;

                if(w > h && w > maxSide){
                    h = h * maxSide / w;
                    w = maxSide;
                }
                if(h > maxSide){
                    w = w * maxSide / h;
                    h = maxSide;
                }

                canvas.width = w;
                canvas.height = h;
                canvas.getContext("2d").drawImage(img, 0, 0, w, h);
                resolve(canvas.toDataURL("image/jpeg", 0.6));
            }
        }
    });
}

close-btn.onclick = function(){
    preview.style.display = "none";
}
preview.onclick = function(e){
    if(e.target === preview){
        preview.style.display = "none";
    }
}
</script>

</body>
</html>
