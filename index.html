<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>相册</title>
<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}
body {
  background: #ffffff;
}
/* 瀑布流 + 图片四周留白 */
.waterfall {
  column-count: 3;
  column-gap: 30px;
  padding: 20px;
  max-width: 1400px;
  margin: 0 auto;
}
@media (max-width:900px){.waterfall{column-count:2;}}
@media (max-width:500px){.waterfall{column-count:1;}}
.img-item {
  break-inside: avoid;
  margin-bottom: 30px;
  background: #fff;
  padding: 15px; /* 四周留白 */
}
.img-item img {
  width: 100%;
  display: block;
  image-rendering: -webkit-optimize-contrast;
}
/* 管理界面默认隐藏 */
.admin-wrap {
  display: none;
  padding: 20px;
  background: #f7f7f7;
  border-top: 1px solid #eee;
}
input {
  display: block;
  width: 100%;
  max-width: 420px;
  margin: 8px auto;
  padding: 10px;
  border: 1px solid #ddd;
}
button {
  padding: 10px 20px;
  background: #333;
  color: #fff;
  border: none;
  cursor: pointer;
  margin: 6px auto;
  display: block;
}
.tip{text-align:center;color:#999;margin:10px 0;}
</style>
</head>
<body>

<div class="waterfall" id="waterfall"></div>

<!-- 管理面板 默认隐藏 -->
<div class="admin-wrap" id="adminWrap">
  <h3 style="text-align:center">管理员后台</h3>
  <input type="password" id="pwdInp" placeholder="管理密码 123686">
  <button onclick="loginAdmin()">登录管理</button>

  <div id="cfgBox" style="display:none;">
    <input id="uName" placeholder="GitHub用户名">
    <input id="uRepo" placeholder="仓库名 photo-album">
    <input id="uGist" placeholder="GistID">
    <input id="uToken" placeholder="你的私密Token">
    <button onclick="saveCfg()">保存配置</button>
  </div>

  <div id="uploadBox" style="display:none;">
    <input type="file" id="fileInp" accept="image/*" multiple>
    <button onclick="upImg()">上传图片</button>
    <p class="tip">最多80张，刷新不丢失</p >
  </div>
</div>

<script>
const PASS = "123686";
const MAX_NUM = 80;

let adminMode = false;
let imgArr = [];
let clickCount = 0;
let cfg = JSON.parse(localStorage.getItem("myAlbumCfg")||"{}");

// 三击屏幕呼出管理
document.addEventListener("click",()=>{
  clickCount++;
  setTimeout(()=>clickCount=0,800);
  if(clickCount >= 3){
    document.getElementById("adminWrap").style.display = "block";
  }
});

// 页面加载立刻读取Gist图片
window.onload = async function(){
  await loadImagesFromGist();
  renderWaterfall();
};

// 从Gist读取图库（核心修复：刷新不空白）
async function loadImagesFromGist(){
  if(!cfg.gistid) return;
  try{
    let res = await fetch("https://api.github.com/gists/" + cfg.gistid);
    let json = await res.json();
    let content = json.files["photos.json"].content;
    imgArr = JSON.parse(content);
  }catch(e){
    imgArr = [];
    console.log("读取为空或首次加载");
  }
}

function loginAdmin(){
  let val = document.getElementById("pwdInp").value.trim();
  if(val === PASS){
    adminMode = true;
    document.getElementById("cfgBox").style.display = "block";
    document.getElementById("uploadBox").style.display = "block";
    document.getElementById("uName").value = cfg.username||"";
    document.getElementById("uRepo").value = cfg.repo||"";
    document.getElementById("uGist").value = cfg.gistid||"";
    document.getElementById("uToken").value = cfg.token||"";
    alert("管理员已解锁");
    renderWaterfall();
  }else{
    alert("密码错误");
  }
}

function saveCfg(){
  cfg.username = document.getElementById("uName").value.trim();
  cfg.repo = document.getElementById("uRepo").value.trim();
  cfg.gistid = document.getElementById("uGist").value.trim();
  cfg.token = document.getElementById("uToken").value.trim();
  localStorage.setItem("myAlbumCfg",JSON.stringify(cfg));
  alert("配置已保存，现在可以上传");
  loadImagesFromGist();
  renderWaterfall();
}
