<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>相册</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{background:#fff;padding:30px 0;}
/* 左右留白，不顶手机屏幕 */
.container{padding:0 20px;}
/* 上传按钮默认隐藏，别人看不见 */
.upload-btn{
    position:fixed;top:20px;right:20px;
    width:50px;height:50px;background:#fff;
    border:2px solid #eee;border-radius:50%;
    font-size:24px;color:#333;cursor:pointer;
    display:none;align-items:center;justify-content:center;z-index:999;
}
#file-input{display:none;}
/* 上下间距加宽 */
.waterfall{display:flex;flex-direction:column;gap:30px;}
/* 图片直角 不要圆角 */
.waterfall img{width:100%;border-radius:0;display:block;cursor:pointer;}
.preview{
    position:fixed;inset:0;background:rgba(255,255,255,0.97);
    display:none;align-items:center;justify-content:center;z-index:998;
}
.preview img{max-width:92vw;max-height:90vh;border-radius:0;}
.close-btn{
    position:fixed;top:20px;right:20px;
    background:transparent;border:none;font-size:32px;color:#333;cursor:pointer;
}
</style>
</head>
<body>

<button class="upload-btn" onclick="fileInput.click()">+</button>
<input type="file" id="file-input" accept="image/*" multiple>

<div class="container">
    <div class="waterfall" id="waterfall"></div>
</div>

<div class="preview" id="preview">
    <button class="close-btn">×</button>
    < img alt="">
</div>

<script>
// 管理员密码 123686 已写死在这里
const ADMIN_PWD = "123686";
let isAdmin = false;
let clickCount = 0;

const fileInput = document.getElementById('file-input');
const waterfall = document.getElementById('waterfall');
const preview = document.getElementById('preview');
const previewImg = preview.querySelector('img');
const uploadBtn = document.querySelector('.upload-btn');

const KEY = "my_photo_album_2026";
let imgList = JSON.parse(localStorage.getItem(KEY)) || [];

function render(){
    waterfall.innerHTML = "";
    for(let i=0;i<imgList.length;i++){
        let img = document.createElement("img");
        img.src = imgList[i];
        img.onclick = function(){
            if(isAdmin){
                if(confirm("确定删除这张照片？")){
                    imgList.splice(i,1);
                    localStorage.setItem(KEY,JSON.stringify(imgList));
                    render();
                }
            }else{
                previewImg.src = imgList[i];
                preview.style.display = "flex";
            }
        }
        waterfall.appendChild(img);
    }
}
render();

// 页面连续点击3次 弹出密码框
document.body.onclick = function(){
    clickCount++;
    setTimeout(()=>clickCount=0,800);
    if(clickCount>=3 && !isAdmin){
        let p = prompt("请输入管理员密码");
        // 判断密码是否等于 123686
        if(p === ADMIN_PWD){
            isAdmin = true;
            uploadBtn.style.display = "flex";
            alert("管理员验证成功，可以上传和删除照片");
        }else{
            alert("密码错误");
        }
    }
};

// 上传+图片压缩，支持存够80张
fileInput.onchange = async function(e){
    if(!isAdmin)return;
    let files = e.target.files;
    for(let i=0;i<files.length;i++){
        let res = await compress(files[i]);
        imgList.push(res);
        localStorage.setItem(KEY,JSON.stringify(imgList));
        render();
    }
    fileInput.value = "";
};

function compress(file){
    return new Promise(resolve=>{
        let r = new FileReader();
        r.readAsDataURL(file);
        r.onload = function(){
            let img = new Image();
            img.src = r.result;
            img.onload = function(){
                let canvas = document.createElement("canvas");
                let w = img.width, h = img.height;
                let max = 1000;
                if(w>h&&w>max){h=h*max/w;w=max;}
                if(h>max){w=w*max/h;h=max;}
                canvas.width=w;canvas.height=h;
                canvas.getContext("2d").drawImage(img,0,0,w,h);
                resolve(canvas.toDataURL("image/jpeg",0.6));
            }
        }
    });
}

close-btn.onclick = function(){preview.style.display="none";};
preview.onclick = function(e){if(e.target===preview)preview.style.display="none";};
</script>
</body>
</html>
